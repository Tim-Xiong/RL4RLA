script: run_mcts.py
initial-algorithm: null
default-algorithm: null
new-steps: 2

# Search configuration
n-playouts: 100000
c: 0.5
score-fn: uct
temperature: 0.0
tree-reuse: true
early-stopping: true
stopping-factor: 1.0
use-lucb: true
best-action-metric: "q_value"

# Environment configuration
system-type: PSD
num-rows: 5
num-cols: 5
condition-number: 2.0
prop-range: 1.0
lev: low
vt-dis: gauss

# Loop configuration
setup-loop: false
forward-loop: true
update-loop: false

# Solver configuration
max-iterations: 10
learning-rate: 0.1
sampling-factor: 8
batch-size: 100

# Reward configuration
base-weight: 1.0
decay-weight: 10.0
complexity-weight: 8.0
condition-weight: 1.0
reward-type: log
iterative-sketch: false
condition-reward-only: false

# Output configuration
log-dir: null
db-path: null
random-seed: 42

# Experiment tracking
target-algorithm: "jacobi iteration"
focus-operator: "MAT_VEC_MUL,VEC_VEC_SUB"
